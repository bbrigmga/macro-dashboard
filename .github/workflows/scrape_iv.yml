name: Daily IV Scrape

permissions:
  contents: write

on:
  schedule:
    # Run at 9 PM UTC (4 PM ET) on weekdays after market close
    - cron: '0 21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      force_run:
        description: 'Force run even on weekends'
        required: false
        default: false
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Scheduled workflows default to detached HEAD; must checkout a branch to push
        ref: ${{ github.event.repository.default_branch }}
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create volatility data directory
      run: mkdir -p data/volatility

    - name: Restore latest IV database artifact
      uses: actions/download-artifact@v4
      with:
        name: iv-database-latest
        path: data/volatility/
      continue-on-error: true

    - name: Record pre-scrape DB stats
      id: pre_stats
      run: |
        set -e
        if [ -f "data/volatility/iv_data.db" ]; then
          eval "$(python scripts/iv_db_stats.py --format env)"
          echo "pre_spy_days=${IV_SPY_DAYS}" >> "$GITHUB_OUTPUT"
          echo "Pre-scrape SPY days in DB: ${IV_SPY_DAYS}"
        else
          echo "pre_spy_days=0" >> "$GITHUB_OUTPUT"
          echo "Pre-scrape: no database file yet"
        fi
      
    - name: Run IV scraper
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        echo "Starting daily IV scrape..."
        python scripts/scrape_iv.py
        echo "Scrape completed"
        
    - name: Verify DB history was preserved
      id: post_stats
      run: |
        set -e
        if [ ! -f "data/volatility/iv_data.db" ]; then
          echo "Post-scrape: database file missing"
          exit 1
        fi
        eval "$(python scripts/iv_db_stats.py --format env)"
        echo "post_spy_days=${IV_SPY_DAYS}" >> "$GITHUB_OUTPUT"
        echo "Post-scrape SPY days in DB: ${IV_SPY_DAYS}"

        PRE="${{ steps.pre_stats.outputs.pre_spy_days }}"
        POST="${IV_SPY_DAYS}"
        if [ "$PRE" -gt 0 ] && [ "$POST" -lt "$PRE" ]; then
          echo "ERROR: Database history shrank ($PRE -> $POST). Refusing to publish."
          exit 1
        fi
        python scripts/iv_db_stats.py
        
    - name: Upload IV database as artifact
      uses: actions/upload-artifact@v4
      with:
        name: iv-database-latest
        path: data/volatility/iv_data.db
        overwrite: true
        retention-days: 90
        if-no-files-found: error
        
    - name: Commit database updates
      if: success()
      run: |
        if [ ! -f "data/volatility/iv_data.db" ]; then
          echo "No database file produced; skipping commit/push step"
          exit 0
        fi

        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # Force-add: iv_data.db is in .gitignore but we persist it via Actions
        git add -f data/volatility/iv_data.db
        if git diff --staged --quiet; then
          echo "No database changes to commit"
        else
          git commit -m "Update IV database $(date -u +%Y-%m-%d)"
          git fetch origin "${{ github.event.repository.default_branch }}"
          git rebase "origin/${{ github.event.repository.default_branch }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
        fi
