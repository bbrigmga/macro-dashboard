name: Daily IV Scrape

on:
  schedule:
    # Run at 9 PM UTC (4 PM ET) on weekdays after market close
    - cron: '0 21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      force_run:
        description: 'Force run even on weekends'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create volatility data directory
      run: mkdir -p data/volatility
      
    - name: Run IV scraper
      run: |
        echo "Starting daily IV scrape..."
        python scripts/scrape_iv.py
        echo "Scrape completed"
        
    - name: Check database exists
      run: |
        if [ -f "data/volatility/iv_data.db" ]; then
          echo "Database exists, size: $(stat -f%z data/volatility/iv_data.db 2>/dev/null || stat -c%s data/volatility/iv_data.db) bytes"
          echo "Latest records:"
          sqlite3 data/volatility/iv_data.db "SELECT ticker, date, iv_30d, rv_20d FROM daily_iv ORDER BY date DESC, ticker LIMIT 10;"
        else
          echo "Warning: Database file not found"
        fi
        
    - name: Upload IV database as artifact
      uses: actions/upload-artifact@v4
      with:
        name: iv-database-${{ github.run_number }}
        path: data/volatility/iv_data.db
        retention-days: 30
        
    - name: Upload scraper logs
      uses: actions/upload-artifact@v4
      if: always()  # Upload logs even if scraper fails
      with:
        name: scraper-logs-${{ github.run_number }}
        path: scripts/scrape_iv.log
        retention-days: 7
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "::error::Daily IV scrape failed. Check logs for details."
        
    # Optional: Commit database back to repo (commented out by default)
    # This approach stores the database in git, which may not be ideal for binary files
    # - name: Commit database updates
    #   if: success()
    #   run: |
    #     git config --local user.email "action@github.com"
    #     git config --local user.name "GitHub Action"
    #     git add data/volatility/iv_data.db
    #     git diff --cached --quiet || git commit -m "Update IV database $(date -u +%Y-%m-%d)"
    #     git push